<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椰香綿雲那堤 | 星巴克</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo-container">
            <div class="logo"><img src="./images/logo.png" alt="照片"></div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">首頁</a></li>
            <li><a href="trio.html">濃萃義式厚那堤</a></li>
            <li><a href="popcorn.html">爆米花那堤</a></li>
            <li><a href="coconut.html" class="active">椰香綿雲那堤</a></li>
            <li><a href="latte.html">那堤</a></li>
        </ul>
    </nav>
    <main class="drink-detail-container">
        <div class="drink-image-side">
            <img src="images/2025120811570200.jpg" alt="Coconut Latte">
        </div>
        <div class="drink-info-side">
            <div class="drink-header">
                <h1>椰香綿雲那堤</h1>
                <div class="subtitle">Coconut Cloud Creamy Latte</div>
                <div class="drink-description">
                    如雲朵般的細緻椰香奶泡，覆蓋在溫潤的那堤之上，帶給您南洋度假般的輕快心情。
                </div>
            </div>
            <div class="steps-side">
                <h3 style="color: var(--sb-dark-green); margin-bottom: 1rem;">製作步驟</h3>
                <div class="step-item">
                    <div class="step-number">1</div>
                    <div class="step-content">
                        <h4>椰香調製</h4>
                        <p>將椰奶混合同樣比例的低脂鮮奶，加熱並攪打出豐富綿密的「綿雲」奶泡。</p>
                    </div>
                </div>
                <div class="step-item">
                    <div class="step-number">2</div>
                    <div class="step-content">
                        <h4>咖啡基礎</h4>
                        <p>在杯中準備好新鮮萃取的標準濃縮咖啡。</p>
                    </div>
                </div>
                <div class="step-item">
                    <div class="step-number">3</div>
                    <div class="step-content">
                        <h4>層次疊加</h4>
                        <p>緩緩倒入椰香熱液體，讓綿雲奶泡懸浮於咖啡之上呈現輕柔質感。</p>
                    </div>
                </div>
            </div>
            <div>
                <a href="index.html" class="btn btn-primary">回到首頁</a>
            </div>
        </div>
    </main>
    <footer class="main-footer">
        <p class="footer-copy">&copy; 2026 Starbucks Coffee Company. All rights reserved.</p>
    </footer>
</body>
</html>
