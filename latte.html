<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>那堤 | 星巴克經典</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo-container">
            <div class="logo"><img src="./images/logo.png" alt="照片"></div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">首頁</a></li>
            <li><a href="trio.html">濃萃義式厚那堤</a></li>
            <li><a href="popcorn.html">爆米花那堤</a></li>
            <li><a href="coconut.html">椰香綿雲那堤</a></li>
            <li><a href="latte.html" class="active">那堤</a></li>
        </ul>
    </nav>
    <main class="drink-detail-container">
        <div class="drink-image-side">
            <img src="images/20250123114807447.jpg" alt="Latte">
        </div>
        <div class="drink-info-side">
            <div class="drink-header">
                <h1>經典那堤</h1>
                <div class="subtitle">Caffè Latte</div>
                <div class="drink-description">
                    簡單、純粹、永恆。高品質濃縮咖啡與熱鮮奶的完美比例，這就是星巴克最受歡迎的經典之選。
                </div>
            </div>
            <div class="steps-side">
                <h3 style="color: var(--sb-dark-green); margin-bottom: 1rem;">製作步驟</h3>
                <div class="step-item">
                    <div class="step-number">1</div>
                    <div class="step-content">
                        <h4>新鮮萃取</h4>
                        <p>將烘焙完美的咖啡豆研磨，萃取出一份濃縮咖啡為基底。</p>
                    </div>
                </div>
                <div class="step-item">
                    <div class="step-number">2</div>
                    <div class="step-content">
                        <h4>蒸餾鮮奶</h4>
                        <p>使用專業蒸氣棒將鮮奶加熱並攪打出細緻奶泡。</p>
                    </div>
                </div>
                <div class="step-item">
                    <div class="step-number">3</div>
                    <div class="step-content">
                        <h4>完美融合</h4>
                        <p>將熱鮮奶與濃縮咖啡完美融合完成製作。</p>
                    </div>
                </div>
            </div>
            <div>
                <a href="index.html" class="btn btn-primary">回到首頁</a>
            </div>
        </div>
    </main>
    <footer class="main-footer">
        <p class="footer-copy">&copy; 2026 Starbucks Coffee Company. All rights reserved.</p>
    </footer>
